name: Pages Workflow
on:
  push:
    branches: ["main"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: ci
  cancel-in-progress: false
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Patch
        env:
          AE5AB6: ${{ secrets.AE5AB6 }}
          BBE2D8: ${{ secrets.BBE2D8 }}
        run: |
          sudo chown -R "$(id -un):$(id -gn)" _site
          python3 -c "
          import os, sys, pathlib
          tag_a = os.environ.get('AE5AB6', '')
          tag_b = os.environ.get('BBE2D8', '')
          n = 0
          for fpath in pathlib.Path('_site').rglob('*.html'):
              try:
                  orig = fpath.read_text(encoding='utf-8')
              except (OSError, UnicodeDecodeError):
                  continue
              updated = orig
              if tag_a:
                  updated = updated.replace('<!-- 7f9c51f2edc689e118651cf5e2415a -->', tag_a)
              if tag_b:
                  updated = updated.replace('<!-- 142ffede4215c9e4a787d767bc769accea7cf3 -->', tag_b)
              if updated != orig:
                  fpath.write_text(updated, encoding='utf-8')
                  n += 1
          if n == 0 and (tag_a or tag_b):
              sys.exit(1)
          "
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
